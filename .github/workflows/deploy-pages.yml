name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment artifact
        shell: bash
        run: |
          mkdir -p _site
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.vscode/' \
            --exclude '_site/' \
            --exclude 'deploy.zip' \
            --exclude 'category-theme-preview.html' \
            --exclude 'icon-preview.html' \
            --exclude 'mix-gallery.html' \
            --exclude 'words-grid.html' \
            ./ _site/

      - name: Validate ads.txt
        shell: bash
        run: |
          test -f _site/ads.txt
          grep -Fxq 'google.com, pub-8689281093776842, DIRECT, f08c47fec0942fa0' _site/ads.txt

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
