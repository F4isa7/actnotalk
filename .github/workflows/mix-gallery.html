<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>مكس الصور | ActNoTalk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #1c2a30;
        --ink-soft: #425a64;
        --sand: #f4f1ec;
        --accent: #f4a23a;
        --accent-dark: #d07d18;
        --card: #ffffff;
        --shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Tajawal", system-ui, sans-serif;
        color: var(--ink);
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, #f8d7a8 0%, rgba(248, 215, 168, 0) 55%),
          radial-gradient(circle at 15% 80%, #d9e4ea 0%, rgba(217, 228, 234, 0) 55%),
          #f7f7f7;
        padding: 32px 18px 48px;
      }

      .wrap {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        background: var(--card);
        border-radius: 22px;
        padding: 20px 24px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      h1 {
        font-family: "El Messiri", cursive;
        font-size: 2rem;
        color: var(--ink);
      }

      .subtitle {
        color: var(--ink-soft);
        font-size: 1rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .toolbar button {
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: white;
        padding: 10px 18px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 10px 18px rgba(244, 162, 58, 0.35);
      }

      .toolbar button:hover {
        transform: translateY(-2px);
      }

      .stats {
        font-size: 0.95rem;
        color: var(--ink-soft);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
        margin-top: 24px;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 12px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow: hidden;
      }

      .thumb {
        width: 100%;
        height: 190px;
        border-radius: 14px;
        background: #f0f0f0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .meta {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .word {
        font-weight: 700;
        font-size: 1rem;
      }

      .tag {
        align-self: flex-start;
        background: rgba(74, 101, 114, 0.12);
        color: var(--ink-soft);
        border-radius: 999px;
        padding: 4px 12px;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .fallback {
        font-size: 0.9rem;
        color: #8a8a8a;
      }

      @media (max-width: 600px) {
        header {
          padding: 18px;
        }
        h1 {
          font-size: 1.6rem;
        }
        .thumb {
          height: 160px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>مكس الصور من الفئات</h1>
        <p class="subtitle">صور المسلسلات + المسرحيات + الأغاني العربية في صفحة واحدة.</p>
        <div class="toolbar">
          <button type="button" id="shuffleBtn">تحديث المكس</button>
          <div class="stats" id="stats"></div>
        </div>
      </header>

      <div class="grid" id="mixGrid"></div>
    </div>

    <script>
      const sources = [
        {
          label: 'مسلسلات',
          folder: 'صور المسلسلات',
          files: [
            "اختطاف.jpeg",
            "الحشاشين.jpeg",
            "الزير سالم.jpeg",
            "العاصوف.jpg",
            "اميمة في دار الأيتام.jfif",
            "باب الحارة.jpeg",
            "بنات الثانوية.png",
            "بيت العنكبوت.jpeg",
            "بين الماضي والحب.jpeg",
            "ثانوية النسيم.jpeg",
            "جمان.jpg",
            "حب بين السطور.jpeg",
            "خالتي قماشة.png",
            "خريف القلب.jpeg",
            "خمس بنات.jpg",
            "دفعة بيروت.jpg",
            "رشاش.jpg",
            "رقية وسبيكة.png",
            "ساهر الليل.jpeg",
            "سكة سفر.jpg",
            "شارع الاعشى.jpeg",
            "صفحة بيضاء.jpeg",
            "طاش ماطاش.jpeg",
            "عندما يكتمل القمر.jpg",
            "فرقة ناجي عطالله.jpeg",
            "فهد البطل.jpeg",
            "مخرج 7.jpg",
            "مذكرات عائلية جدا.jpg",
            "ملحق بنات.png",
            "ممنوع التجول.jpg",
            "منهو ولدنا.jpg",
            "يس عبدالملك.jpeg",
            "يوميات رجل عانس.jpg"
          ]
        },
        {
          label: 'مسرحيات',
          folder: 'صور مسرحيات',
          files: [
            "العظماء السبعة.jpeg",
            "العيال كبرت.jpg",
            "عرش دراكولا.png",
            "قلب للبيع.jpg",
            "ليلة زفته.png",
            "مبروك ما ياكم.jpg",
            "مدرسة المشاغبين.jpg"
          ]
        },
        {
          label: 'أغاني عربية',
          folder: 'صور اغاني عربية',
          files: [
            "سيرة الحب.jpg",
            "عمرو دياب.jpg",
            "فضل شاكر.png"
          ]
        }
      ];

      const mixGrid = document.getElementById('mixGrid');
      const stats = document.getElementById('stats');
      const shuffleBtn = document.getElementById('shuffleBtn');

      const shuffle = (arr) => {
        const copy = [...arr];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      };

      const buildPool = () => {
        const pool = [];
        sources.forEach((source) => {
          source.files.forEach((file) => {
            pool.push({
              label: source.label,
              folder: source.folder,
              file
            });
          });
        });
        return pool;
      };

      const render = (items) => {
        mixGrid.innerHTML = '';
        items.forEach((item) => {
          const card = document.createElement('div');
          card.className = 'card';

          const thumb = document.createElement('div');
          thumb.className = 'thumb';

          const img = document.createElement('img');
          img.alt = item.file;
          img.loading = 'lazy';
          img.src = `${encodeURIComponent(item.folder)}/${encodeURIComponent(item.file)}`;
          img.onerror = () => {
            thumb.innerHTML = '<span class=\"fallback\">لا توجد صورة</span>';
          };

          thumb.appendChild(img);

          const meta = document.createElement('div');
          meta.className = 'meta';

          const word = document.createElement('div');
          word.className = 'word';
          word.textContent = item.file.replace(/\.[^/.]+$/, '');

          const tag = document.createElement('div');
          tag.className = 'tag';
          tag.textContent = item.label;

          meta.appendChild(word);
          meta.appendChild(tag);

          card.appendChild(thumb);
          card.appendChild(meta);
          mixGrid.appendChild(card);
        });
      };

      const refresh = () => {
        const pool = shuffle(buildPool());
        const limit = Math.min(pool.length, 24);
        render(pool.slice(0, limit));
        stats.textContent = `يعرض الآن ${limit} صورة من أصل ${pool.length}`;
      };

      shuffleBtn.addEventListener('click', refresh);
      refresh();
    </script>
  </body>
</html>
